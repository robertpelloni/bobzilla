// bobzilla default preferences
// Based on LibreWolf and arkenfox user.js
// These are applied on top of Firefox defaults

// =============================================================================
// SECTION: STARTUP
// =============================================================================

// Disable about:config warning
pref("browser.aboutConfig.showWarning", false);

// Set startup page (0=blank, 1=home, 2=last visited, 3=resume previous session)
pref("browser.startup.page", 3);

// Blank new tab page
pref("browser.newtabpage.enabled", false);

// =============================================================================
// SECTION: GEOLOCATION / LANGUAGE
// =============================================================================

// Use Mozilla geolocation service instead of Google
pref("geo.provider.network.url", "https://location.services.mozilla.com/v1/geolocate?key=%MOZILLA_API_KEY%");

// Disable OS geolocation
pref("geo.provider.ms-windows-location", false);
pref("geo.provider.use_corelocation", false);
pref("geo.provider.use_gpsd", false);
pref("geo.provider.use_geoclue", false);

// =============================================================================
// SECTION: TELEMETRY / DATA COLLECTION (ALL DISABLED)
// =============================================================================

// Disable all telemetry
pref("toolkit.telemetry.unified", false);
pref("toolkit.telemetry.enabled", false);
pref("toolkit.telemetry.server", "data:,");
pref("toolkit.telemetry.archive.enabled", false);
pref("toolkit.telemetry.newProfilePing.enabled", false);
pref("toolkit.telemetry.shutdownPingSender.enabled", false);
pref("toolkit.telemetry.updatePing.enabled", false);
pref("toolkit.telemetry.bhrPing.enabled", false);
pref("toolkit.telemetry.firstShutdownPing.enabled", false);
pref("toolkit.telemetry.coverage.opt-out", true);
pref("toolkit.coverage.opt-out", true);
pref("toolkit.coverage.endpoint.base", "");

// Disable Health Reports
pref("datareporting.healthreport.uploadEnabled", false);
pref("datareporting.policy.dataSubmissionEnabled", false);

// Disable crash reports
pref("breakpad.reportURL", "");
pref("browser.tabs.crashReporting.sendReport", false);
pref("browser.crashReports.unsubmittedCheck.autoSubmit2", false);

// Disable Normandy/Shield studies
pref("app.normandy.enabled", false);
pref("app.normandy.api_url", "");
pref("app.shield.optoutstudies.enabled", false);

// Disable Ping Centre telemetry
pref("browser.ping-centre.telemetry", false);

// Disable Activity Stream telemetry
pref("browser.newtabpage.activity-stream.feeds.telemetry", false);
pref("browser.newtabpage.activity-stream.telemetry", false);

// =============================================================================
// SECTION: POCKET (DISABLED)
// =============================================================================

pref("extensions.pocket.enabled", false);
pref("extensions.pocket.api", "");
pref("extensions.pocket.oAuthConsumerKey", "");
pref("extensions.pocket.showHome", false);
pref("extensions.pocket.site", "");

// =============================================================================
// SECTION: SPONSORED CONTENT (ALL DISABLED)
// =============================================================================

pref("browser.newtabpage.activity-stream.showSponsored", false);
pref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
pref("browser.newtabpage.activity-stream.default.sites", "");
pref("browser.urlbar.suggest.quicksuggest.sponsored", false);
pref("browser.urlbar.suggest.quicksuggest.nonsponsored", false);

// =============================================================================
// SECTION: NETWORK / DNS
// =============================================================================

// DNS over HTTPS (enabled by default, using Cloudflare)
pref("network.trr.mode", 2);
pref("network.trr.uri", "https://mozilla.cloudflare-dns.com/dns-query");

// Disable DNS prefetching
pref("network.dns.disablePrefetch", true);

// Disable predictor / prefetching
pref("network.predictor.enabled", false);
pref("network.prefetch-next", false);
pref("network.http.speculative-parallel-limit", 0);

// =============================================================================
// SECTION: HTTPS / SSL/TLS
// =============================================================================

// HTTPS-Only Mode
pref("dom.security.https_only_mode", true);
pref("dom.security.https_only_mode_send_http_background_request", false);

// Require safe negotiation
pref("security.ssl.require_safe_negotiation", true);

// Display advanced info on insecure pages
pref("browser.xul.error_pages.expert_bad_cert", true);

// OCSP - require valid response
pref("security.OCSP.require", true);

// =============================================================================
// SECTION: PRIVACY / FINGERPRINTING
// =============================================================================

// Enhanced Tracking Protection - Strict
pref("browser.contentblocking.category", "strict");
pref("privacy.trackingprotection.enabled", true);
pref("privacy.trackingprotection.socialtracking.enabled", true);

// Fingerprinting protection (not as aggressive as Tor, but helps)
pref("privacy.resistFingerprinting", false);  // Can break some sites, disabled by default
pref("privacy.resistFingerprinting.letterboxing", false);

// Canvas fingerprinting - ask permission
pref("privacy.canvas.read.ask", true);

// WebGL - potential fingerprint vector but useful
pref("webgl.disabled", false);

// =============================================================================
// SECTION: COOKIES / STORAGE
// =============================================================================

// Cookie behavior (1=block third-party, 4=block cross-site + social, 5=isolate)
pref("network.cookie.cookieBehavior", 5);
pref("network.cookie.cookieBehavior.pbmode", 5);

// Total Cookie Protection (dFPI)
pref("network.cookie.cookieBehavior", 5);

// Clear cookies on shutdown (disabled by default, user can enable)
pref("network.cookie.lifetimePolicy", 0);

// =============================================================================
// SECTION: CONTAINERS / ISOLATION
// =============================================================================

// First-party isolation (can break some sites)
pref("privacy.firstparty.isolate", false);

// State partitioning (default on in strict mode)
pref("privacy.partition.serviceWorkers", true);
pref("privacy.partition.always_partition_third_party_non_cookie_storage", true);
pref("privacy.partition.always_partition_third_party_non_cookie_storage.exempt_sessionstorage", false);

// =============================================================================
// SECTION: DRM / MEDIA
// =============================================================================

// Enable Widevine DRM (we want Netflix to work)
pref("media.eme.enabled", true);
pref("media.gmp-widevinecdm.enabled", true);
pref("media.gmp-widevinecdm.visible", true);

// Hardware video acceleration
pref("media.hardware-video-decoding.enabled", true);
pref("media.hardware-video-decoding.force-enabled", false);

// AV1 codec support
pref("media.av1.enabled", true);

// =============================================================================
// SECTION: DOWNLOADS
// =============================================================================

// Always ask where to save
pref("browser.download.useDownloadDir", true);

// Disable adding downloads to system recent documents
pref("browser.download.manager.addToRecentDocs", false);

// =============================================================================
// SECTION: SEARCH / URL BAR
// =============================================================================

// Use DuckDuckGo as default (can be changed)
pref("browser.urlbar.placeholderName", "DuckDuckGo");
pref("browser.urlbar.placeholderName.private", "DuckDuckGo");

// Disable search suggestions from search engine
pref("browser.search.suggest.enabled", false);
pref("browser.urlbar.suggest.searches", false);

// Disable trending searches
pref("browser.urlbar.trending.featureGate", false);
pref("browser.urlbar.suggest.trending", false);

// =============================================================================
// SECTION: PASSWORDS / FORMS
// =============================================================================

// Enable built-in password manager (user can use external instead)
pref("signon.rememberSignons", true);
pref("signon.autofillForms", false);
pref("signon.formlessCapture.enabled", false);

// Disable form autofill
pref("extensions.formautofill.addresses.enabled", false);
pref("extensions.formautofill.creditCards.enabled", false);

// =============================================================================
// SECTION: MISC
// =============================================================================

// Disable beacon (analytics)
pref("beacon.enabled", false);

// Disable battery status API
pref("dom.battery.enabled", false);

// Disable Web Audio API fingerprinting (may break some sites)
pref("dom.webaudio.enabled", true);

// Disable Media Capabilities API enumeration
pref("media.media-capabilities.enabled", false);

// Limit referrer information
pref("network.http.referer.XOriginTrimmingPolicy", 2);

// Disable UITour
pref("browser.uitour.enabled", false);

// Disable remote debugging
pref("devtools.debugger.remote-enabled", false);
pref("devtools.chrome.enabled", false);

// Disable Web Compatibility Reporter
pref("extensions.webcompat-reporter.enabled", false);

// =============================================================================
// SECTION: BOBZILLA SPECIFIC
// =============================================================================

// Custom branding
pref("browser.aboutwelcome.enabled", false);
pref("startup.homepage_welcome_url", "");
pref("startup.homepage_override_url", "");

// Enable userChrome.css customization
pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);

// Compact mode option
pref("browser.compactmode.show", true);
